upstream letskonnect {
  server unix:///tmp/letskonnect.sock;
}

server {
  listen 80;
  server_name letskonnect.in www.letskonnect.in;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name letskonnect.in www.letskonnect.in;

  ssl_certificate     /etc/ssl/certs/letskonnect.crt;
  ssl_certificate_key /etc/ssl/private/letskonnect.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  client_max_body_size 20M;
  keepalive_timeout    70;

  # Action Cable WebSocket
  location /cable {
    proxy_pass http://letskonnect;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
  }

  # API
  location / {
    proxy_pass         http://letskonnect;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
